<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Weather App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1>Weather App</h1>
    <p class="subtitle">Search for a city and view the current weather.</p>

    <div class="search-box">
      <input
        type="text"
        id="cityInput"
        placeholder="Enter a city"
        value="Orlando"
      />
      <button id="searchBtn">Get Weather</button>
    </div>

    <section id="weatherCard" class="weather-card hidden">
      <h2 id="locationName"></h2>
      <p><strong>Temperature:</strong> <span id="temperature"></span></p>
      <p><strong>Wind Speed:</strong> <span id="windSpeed"></span></p>
      <p><strong>Time:</strong> <span id="weatherTime"></span></p>
    </section>

    <p id="message" class="message"></p>
  </main>

  <script src="script.js"></script>
</body>
</html>
